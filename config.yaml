topology:
  n_services: 4
  workflows:
    - id: 0
      lam:
        0: 1.0
        30: 1.80
        100: 1.20
        350: 2.50
      root_service: 0
      edges:
        - [0, 1]
    - id: 1
      lam:
        0: 1.0
      root_service: 2
      edges:
        - [2, 3]

infrastructure:
  n_nodes: 3
  cpu_max: 4
  ram: 8
  freq: 1000

simulation:
  iterations: 500
  timeout: 600000
  eval_interval: 10.0
  seed: 42

rl:
  epsilon: 0.30
  epsilon_min: 0.05
  epsilon_decay: 0.992
  alpha: 0.10
  gamma: 0.9

training:
  n_episodes: 1000
  eval_greedy_every: 10

control:
  agent_controls_replicas: true
  agent_controls_placement: false
  agent_control_assignments:
    s1.scaling: agent1
    s2.scaling: agent1
    s3.scaling: agent1
    s4.scaling: agent1

reward:
  e2e_lat_target: 8.0
  reward_cpu_weight: 0.50
  reward_lat_viol_weight: 0.50
  agents:
    agent1:
      workflows:
        0: 0.30   # weight for workflow 0 latency violation rate
        1: 0.20   # weight for workflow 1 latency violation rate
      nodes:
        0: 0.20   # weight for node 0 CPU usage
        1: 0.15   # weight for node 1 CPU usage
        2: 0.15   # weight for node 2 CPU usage
